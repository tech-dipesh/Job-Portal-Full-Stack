      properties:
        fname:
          type: string
        lname:
          type: string
        education:
          type: string
        email:
          type: string
    login:
      type: object
      required: [email, password]
      properties: {}
    request_forget_password:
      type: object
      properties:
        email:
          type: string
    signup:
      type: object
      properties:
        fname:
          type: string
        lname:
          type: string
        password:
          type: string
        education:
          type: string
        email:
          type: string
    skills_add:
