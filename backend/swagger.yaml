        cover_letter:
          type: string
        notice_period:
          type: number
        why_hire:
          type: string
        expected_salary:
          type: number
    change_applicant_status:
      type: object
      properties:
        status:
          type: string
        user_id:
          type: string
    create_new_job:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        job_type:
          type: string
        salary:
          type: number
        skills:
          type: array
          items:
            type: string
          properties:
            "0":
              type: string
            "1":
              type: string
    update_existing_jobs:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        job_type:
          type: string
        salary:
