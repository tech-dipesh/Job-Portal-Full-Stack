      properties:
        code:
          type: number
    verify_forget_password:
      type: object
      properties:
        code:
          type: number
        email:
          type: string
        newpassword:
          type: string
    profile_picture:
      type: object
      properties:
        profile:
          type: string
          format: binary
          items:
            type: string
          properties:
            "0":
              type: string
    upload_resume:
      type: object
      properties:
